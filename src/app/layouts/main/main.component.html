<div class="drawer lg:drawer-open">
  <input id="my-drawer-4" type="checkbox" class="drawer-toggle" [checked]="sidebarService.isOpen()"
    (change)="sidebarService.toggle()" />

  <div class="drawer-content flex flex-col">
    <app-navbar></app-navbar>
    <main class="flex-1 bg-base-200/50 min-h-screen">
      <ng-content></ng-content>
    </main>
  </div>

  <div class="drawer-side is-drawer-close:overflow-visible z-10">
    <label for="my-drawer-4" aria-label="close sidebar" class="drawer-overlay"></label>
    <app-sidebar></app-sidebar>
  </div>
</div>
