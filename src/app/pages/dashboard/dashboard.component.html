<app-main>
  <div class="p-4">
    <!-- items-stretch forces the right side to be the same total height as the chart -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-2 items-stretch">

      <!-- Left: Line Graph (Large Card) -->
      <div class="lg:col-span-2">
        <div class="card bg-base-100 shadow-sm border border-base-200 h-full">
          <div class="card-body p-6">
            <h2 class="card-title text-xl font-bold text-base-content mb-4">{{ chartLabel }}</h2>
            <div class="h-80 w-full">
              <app-line-chart [data]="statsData" [labels]="statsLabels" [label]="chartLabel" [borderColor]="chartColor">
              </app-line-chart>
            </div>
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-2">

        <div class="card bg-base-100 shadow-sm border border-base-200 flex-1">
          <div class="card-body p-6 justify-center">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Wallet Balance</span>
            <h3 class="text-4xl font-bold text-secondary mt-1">$0.00</h3>
            <div class="card-actions justify-end mt-2">
              <span class="badge badge-secondary badge-outline rounded-full px-4">Empty</span>
            </div>
          </div>
        </div>

        <div class="card bg-base-100 shadow-sm border border-base-200 flex-1">
          <div class="card-body p-6 justify-center">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Total Savings</span>
            <h3 class="text-4xl font-bold text-accent mt-1">$1,000.00</h3>
            <div class="card-actions justify-end mt-2">
              <span class="badge badge-accent rounded-full px-4 font-bold">+12%</span>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>
</app-main>
