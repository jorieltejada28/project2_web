<app-main>
    <div class="flex min-h-screen w-full items-center justify-center bg-base-200">
        <div class="card w-full max-w-sm bg-base-100 shadow-2xl rounded-3xl border border-base-content/5">
            <div class="card-body items-center text-center p-10">

                <div
                    class="flex aspect-square size-16 items-center justify-center rounded-2xl bg-primary text-primary-content shadow-lg mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5" class="size-8">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                    </svg>
                </div>

                <h2 class="card-title text-2xl font-black tracking-tight">Welcome Back</h2>
                <p class="text-sm opacity-60 mb-6">Sign in to access your dashboard</p>

                <button (click)="handleGoogleSignIn()"
                    class="btn btn-outline w-full gap-3 border-base-content/20 hover:bg-base-content hover:text-base-100 transition-all duration-300 rounded-xl group">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48"
                        class="group-hover:scale-110 transition-transform">
                        <path fill="#FFC107"
                            d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z" />
                        <path fill="#FF3D00"
                            d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4c-7.539 0-14.129 4.152-17.694 10.691z" />
                        <path fill="#4CAF50"
                            d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z" />
                        <path fill="#1976D2"
                            d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z" />
                    </svg>
                    <span class="font-bold">Continue with Google</span>
                </button>

                <div class="divider text-xs opacity-30 uppercase tracking-widest font-bold mt-8">Secure Access</div>

                <p class="text-[10px] opacity-40 mt-2 leading-relaxed">
                    Lorem ipsum dolor sit amet consectetur adipisicing elit. Eos est aut alias et dolore. Perspiciatis expedita nisi assumenda cumque debitis, magnam quos quo fuga ipsum qui rerum neque ducimus incidunt!
                </p>
            </div>
        </div>
    </div>
</app-main>
