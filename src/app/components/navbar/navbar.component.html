<nav class="navbar w-full bg-base-300">
  <div class="flex-none">
    <label for="my-drawer-4" class="btn btn-square btn-ghost">
      <!-- Your existing Hamburger Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        class="size-4">
        <path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"></path>
        <path d="M9 4v16"></path>
        <path d="M14 10l2 2l-2 2"></path>
      </svg>
    </label>
  </div>

  <div class="flex-1 px-4 font-bold">Dashboard</div>

  <div class="flex-none px-2">
    <button class="btn btn-ghost btn-circle">
      <div class="indicator">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        <span class="badge badge-primary badge-xs indicator-item animate-in zoom-in duration-300">1</span>
      </div>
    </button>
  </div>

  <!-- THEME DROPDOWN -->
  <div class="flex-none">
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button"
        class="group btn btn-sm border-none bg-primary hover:bg-primary-focus text-primary-content rounded-full px-4 gap-3 transition-all duration-300 ease-in-out hover:scale-105 active:scale-95 shadow-[0_5px_15px_-5px_rgba(0,0,0,0.3)] hover:shadow-[0_8px_20px_-5px_rgba(0,0,0,0.4)]">

        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-palette transition-transform duration-500 group-hover:rotate-12">
          <circle cx="13.5" cy="6.5" r=".5" fill="currentColor" />
          <circle cx="17.5" cy="10.5" r=".5" fill="currentColor" />
          <circle cx="8.5" cy="7.5" r=".5" fill="currentColor" />
          <circle cx="6.5" cy="12.5" r=".5" fill="currentColor" />
          <path
            d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.92 0 1.71-.73 1.85-1.64.11-.73.69-1.36 1.47-1.36h1.68c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8z" />
        </svg>

        <div class="flex flex-col items-start leading-none gap-0.5">
          <span class="text-[10px] uppercase tracking-widest font-bold hidden md:block text-neutral">
            Appearance
          </span>
          <span class="text-xs font-semibold capitalize hidden md:inline">
            {{ themeService.currentTheme() }}
          </span>
        </div>

        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
          class="opacity-40 group-hover:translate-y-0.5 transition-transform">
          <path d="m6 9 6 6 6-6" />
        </svg>
      </div>

      <div tabindex="-1"
        class="dropdown-content bg-base-200 text-base-content rounded-t-box rounded-b-box top-px mt-12 h-[70vh] max-h-96 w-56 overflow-y-auto shadow-2xl ring-1 ring-base-content/10 z-[100]">
        <div class="grid grid-cols-1 gap-3 p-3">
          @for (themeName of themes; track themeName) {
          <button class="outline-base-content text-start outline-offset-2" [attr.data-set-theme]="themeName"
            (click)="themeService.setTheme(themeName)">
            <span [attr.data-theme]="themeName"
              class="bg-base-100 text-base-content block w-full cursor-pointer rounded-lg font-sans">
              <span class="grid grid-cols-5 grid-rows-3">
                <span class="col-span-5 row-span-3 row-start-1 flex items-center gap-2 px-4 py-3">
                  @if (themeService.currentTheme() === themeName) {
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
                    class="text-success">
                    <polyline points="20 6 9 17 4 12" />
                  </svg>
                  }
                  <span class="flex-grow text-sm font-bold lowercase">{{ themeName }}</span>

                  <span class="flex h-full shrink-0 flex-wrap gap-1">
                    <span class="bg-primary w-2 rounded-full"></span>
                    <span class="bg-secondary w-2 rounded-full"></span>
                    <span class="bg-accent w-2 rounded-full"></span>
                    <span class="bg-neutral w-2 rounded-full"></span>
                  </span>
                </span>
              </span>
            </span>
          </button>
          }
        </div>
      </div>
    </div>
  </div>
</nav>
