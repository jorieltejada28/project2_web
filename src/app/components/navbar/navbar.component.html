<nav class="navbar w-full bg-base-300">
  <div class="flex-none">
    <label for="my-drawer-4" class="btn btn-square btn-ghost">
      <!-- Your existing Hamburger Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        class="size-4">
        <path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"></path>
        <path d="M9 4v16"></path>
        <path d="M14 10l2 2l-2 2"></path>
      </svg>
    </label>
  </div>

  <div class="flex-1 px-4 font-bold">Dashboard</div>

  <!-- THEME DROPDOWN -->
  <div class="flex-none">
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost m-1">
        Theme
        <svg width="12px" height="12px" class="inline-block h-2 w-2 fill-current opacity-60"
          xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 2048">
          <path d="M1799 349l242 241-1017 1017L7 590l242-241 775 775 775-775z"></path>
        </svg>
      </div>
      <ul tabindex="-1" class="dropdown-content bg-base-300 rounded-box z-100 w-52 p-2 shadow-2xl mt-4">
        @for (themeName of themes; track themeName) {
        <li>
          <input type="radio" name="theme-dropdown"
            class="theme-controller btn btn-sm btn-block btn-ghost justify-start capitalize" [aria-label]="themeName"
            [value]="themeName" [checked]="themeService.currentTheme() === themeName"
            (change)="themeService.setTheme(themeName)" />
        </li>
        }
      </ul>
    </div>
  </div>
</nav>
